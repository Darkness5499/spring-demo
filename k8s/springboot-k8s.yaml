apiVersion: apps/v1
kind: Deployment
metadata:
  name: springboot-app
  namespace: dev # Sẽ deploy vào namespace dev
spec:
  replicas: 3 # Chạy hẳn 2 Pod để chịu tải và dự phòng
  selector:
    matchLabels:
      app: springboot
  template:
    metadata:
      labels:
        app: springboot
    spec:
      containers:
        - name: springboot-container
          # ⚠️ THAY "darkness5499" bằng đúng Docker ID (Username) của bạn nhé
          image: diepvn1/springboot-app:latest
          ports:
            - containerPort: 8081 # Cổng mặc định của Spring Boot
          resources:
            limits:
              memory: "512Mi"
              cpu: "500m"
            requests:
              memory: "256Mi"
              cpu: "250m"
---
apiVersion: v1
kind: Service
metadata:
  name: springboot-service
  namespace: dev
spec:
  selector:
    app: springboot
  ports:
    - protocol: TCP
      port: 80         # Cổng giao tiếp của Service trong cụm
      targetPort: 8081 # Cổng thực tế của Pod Spring Boot
  type: ClusterIP